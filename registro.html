<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Market</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Computadoras.html">Computadora</a></li>
            <li><a href="Celulares.html">Celulares</a></li>
            <li><a href="Tablets.html">Tablets</a></li>
        </ul>
        <button class="logout">Logout</button>
    </nav>

    <!-- Formulario de registro -->
    <h1>Registro</h1>
    <form action="#" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>

        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha" required>

        <button type="submit">Registrarse</button>
        <p class="form-footer"><a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a></p>
    </form>
</body>
</html>
